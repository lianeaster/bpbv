name: Fetch Facebook News

on:
  schedule:
    # Runs every day at 08:00 UTC (11:00 Kyiv time)
    - cron: '0 8 * * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest posts from Facebook group
        env:
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_GROUP_ID: ${{ secrets.FB_GROUP_ID }}
        run: node fetch-news.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet news.json images/news/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news.json images/news/
          git commit -m "news: auto-update from Facebook group"
          git push
